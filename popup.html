<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kajabi Video Downloader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
      padding: 16px;
    }
    h1 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #1a73e8;
      letter-spacing: 0.01em;
    }
    #status {
      color: #555;
      line-height: 1.5;
    }
    #video-info { display: none; }
    #video-title {
      font-weight: 600;
      margin-bottom: 10px;
      word-break: break-word;
      line-height: 1.4;
    }
    label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; }
    select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 12px;
      background: #fafafa;
    }
    button#download-btn {
      width: 100%;
      padding: 9px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button#download-btn:disabled { background: #aaa; cursor: not-allowed; }
    #result {
      margin-top: 10px;
      font-size: 12px;
      min-height: 18px;
    }
    #result.error { color: #c62828; }
    #result.ok { color: #2e7d32; }
  </style>
</head>
<body>
  <h1>Kajabi Video Downloader</h1>
  <p id="status">Detecting…</p>
  <div id="video-info">
    <p id="video-title"></p>
    <label for="quality-select">Quality</label>
    <select id="quality-select"></select>
    <button id="download-btn">Download</button>
    <p id="result"></p>
  </div>
  <div id="bulk-info" style="display:none">
    <p id="bulk-course-label" style="font-size:12px;color:#555;margin:0 0 4px"></p>
    <p id="bulk-progress-text" style="font-size:12px;color:#555;margin:0 0 8px">0 of 0 downloaded</p>
    <progress id="bulk-bar" value="0" max="100" style="width:100%;height:6px;margin-bottom:8px"></progress>
    <details id="bulk-details" style="font-size:12px;margin-bottom:8px">
      <summary style="cursor:pointer;color:#1a73e8">Show lessons <a id="bulk-select-toggle" href="#" style="margin-left:8px;font-size:11px;color:#1a73e8;text-decoration:underline">Deselect all</a></summary>
      <ul id="bulk-list" style="list-style:none;margin:6px 0 0;padding:0;max-height:160px;overflow-y:auto"></ul>
    </details>
    <label for="bulk-quality-select" style="font-size:12px;color:#555;margin-bottom:4px;display:block">Quality</label>
    <select id="bulk-quality-select" style="width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:4px;font-size:13px;margin-bottom:10px;background:#fafafa">
      <option value="-1">Best available</option>
      <option value="1080">1080p</option>
      <option value="720">720p</option>
      <option value="480">480p</option>
      <option value="360">360p</option>
    </select>
    <div style="display:flex;gap:8px">
      <button id="bulk-start-btn" style="flex:1;padding:9px;background:#1a73e8;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer">Download All</button>
      <button id="bulk-cancel-btn" style="display:none;flex:1;padding:9px;background:#c62828;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer">Cancel</button>
    </div>
    <p id="bulk-result" style="margin-top:8px;font-size:12px"></p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
