<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kajabi Video Downloader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
      padding: 16px;
    }
    h1 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #1a73e8;
      letter-spacing: 0.01em;
    }
    #status {
      color: #555;
      line-height: 1.5;
    }
    #video-info { display: none; }
    #video-title {
      font-weight: 600;
      margin-bottom: 10px;
      word-break: break-word;
      line-height: 1.4;
    }
    label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; }
    select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 12px;
      background: #fafafa;
    }
    button#download-btn {
      width: 100%;
      padding: 9px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button#download-btn:disabled { background: #aaa; cursor: not-allowed; }
    #result {
      margin-top: 10px;
      font-size: 12px;
      min-height: 18px;
    }
    #result.error { color: #c62828; }
    #result.ok { color: #2e7d32; }
  </style>
</head>
<body>
  <h1>Kajabi Video Downloader</h1>
  <p id="status">Detecting…</p>
  <div id="video-info">
    <p id="video-title"></p>
    <label for="quality-select">Quality</label>
    <select id="quality-select"></select>
    <button id="download-btn">Download</button>
    <p id="result"></p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
